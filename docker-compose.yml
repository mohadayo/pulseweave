services:
  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-5001}:5001"
    environment:
      - AUTH_SERVICE_PORT=5001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  metrics-engine:
    build:
      context: ./services/metrics-engine
    ports:
      - "${METRICS_ENGINE_PORT:-5002}:5002"
    environment:
      - METRICS_ENGINE_PORT=5002
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dashboard-api:
    build:
      context: ./services/dashboard-api
    ports:
      - "${DASHBOARD_API_PORT:-5003}:5003"
    environment:
      - DASHBOARD_API_PORT=5003
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
